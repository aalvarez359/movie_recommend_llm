<!DOCTYPE html>
<html>
<head>
  <title>Movie Recommender</title>
</head>
<body>
  <h1>🎬 Movie Recommender</h1>
  <form action="/" method="post">
    <label>Enter a Movie Title:</label><br>
    <input type="text" name="movie_title" required><br><br>

    <label>What did you like about it?</label><br>
    <textarea name="user_input" rows="4" cols="50" required></textarea><br><br>

    <input type="submit" value="Recommend">
  </form>

  <br><br>
  <a href="/clear">🗑️ Clear Likes</a>
</body>
</html>
